name: Release & Deploy to Clojars

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  natives:
    name: build + deploy native ${{ matrix.name }}
    strategy:
      # One platform's transient flake (e.g. a Windows Maven-cache rename race in
      # deps-deploy's own dependency resolution) must NOT cancel the others or
      # block the main-jar release. Re-run just the failed job to finish.
      fail-fast: false
      matrix:
        include:
          - { name: linux-x64,    os: ubuntu-latest,    target: x86_64-unknown-linux-gnu,  lib: libruff_c.so }
          - { name: linux-arm64,  os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu, lib: libruff_c.so }
          - { name: darwin-arm64, os: macos-14,         target: aarch64-apple-darwin,      lib: libruff_c.dylib }
          - { name: darwin-x64,   os: macos-14,         target: x86_64-apple-darwin,       lib: libruff_c.dylib }
          - { name: windows-x64,  os: windows-latest,   target: x86_64-pc-windows-msvc,    lib: ruff_c.dll }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/ruff-c
          key: ${{ matrix.target }}
      - name: Build ruff-c cdylib
        working-directory: native/ruff-c
        run: cargo build --release --target ${{ matrix.target }}
      - name: Stage library
        shell: bash
        run: |
          mkdir -p resources/prebuilds/${{ matrix.name }}
          cp "native/ruff-c/target/${{ matrix.target }}/release/${{ matrix.lib }}" \
             "resources/prebuilds/${{ matrix.name }}/${{ matrix.lib }}"
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest
      - name: Deploy native jar to Clojars
        env:
          VERSION: ${{ github.ref_name }}
          CLOJARS_USERNAME: blockether-deployer
          CLOJARS_PASSWORD: ${{ secrets.CLOJARS_DEPLOY_TOKEN }}
        run: clojure -T:build deploy-native :platform "${{ matrix.name }}"

  release:
    name: Release & Deploy main jar to Clojars
    needs: natives
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest
      - name: Check if version exists on Clojars
        id: check-clojars
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://repo.clojars.org/com/blockether/ruff/$VERSION/ruff-$VERSION.jar")
          if [ "$STATUS" = "200" ]; then echo "exists=true" >> "$GITHUB_OUTPUT"; else echo "exists=false" >> "$GITHUB_OUTPUT"; fi
      - name: Build & Deploy main jar to Clojars
        if: steps.check-clojars.outputs.exists != 'true'
        env:
          VERSION: ${{ github.ref_name }}
          CLOJARS_USERNAME: blockether-deployer
          CLOJARS_PASSWORD: ${{ secrets.CLOJARS_DEPLOY_TOKEN }}
        run: clojure -T:build deploy
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
