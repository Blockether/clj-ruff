# GraalVM native-image configuration for com.blockether/ruff.
# Auto-applied when this jar is on the native-image classpath. Pairs with the
# reachability-metadata.json in this directory (FFM downcalls + the bundled
# library resource).
#
# Why each flag:
#   --enable-native-access      the binding loads the cdylib (SymbolLookup.
#                               libraryLookup) and builds downcall handles via
#                               the Foreign Function & Memory API.
#   ForeignAPISupport           enables the FFM downcall stubs in the image.
#
# NO --enable-preview: FFM is a STABLE API since JDK 22 (this binding compiles
# without preview).
#
# NO -H:+SharedArenaSupport: com.blockether.ruff/bind! uses Arena.ofAuto (long-
# lived, GC-managed) for the library lookup and Arena.ofConfined (per-call) for
# formatting — NEVER Arena.ofShared, which is INCOMPATIBLE with Truffle runtime
# compilation (an image that also embeds GraalPy fails with "Arena.ofShared is
# not supported with runtime compilations"). ofAuto/ofConfined need no flag.
#
# The cdylib itself is loaded at RUN TIME from RUFF_NATIVE_PATH, the bundled
# prebuilds/<platform>/ resource (glob in reachability-metadata.json), or — on a
# plain JVM only — the tools.deps download cache. In a native image bundle the
# matching com.blockether/ruff-native-<platform> jar so the glob has something to
# embed, OR set RUFF_NATIVE_PATH.
Args = --enable-native-access=ALL-UNNAMED \
       -H:+UnlockExperimentalVMOptions \
       -H:+ForeignAPISupport
